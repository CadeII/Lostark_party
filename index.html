<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로스트아크 레이드 파티 자동 매칭</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="hero">
        <p class="eyebrow">Lost Ark Raid Matcher</p>
        <h1>레이드 파티 자동 매칭</h1>
        <p>
          owner 이름을 입력하면 캐릭터 레벨, 역할, 시너지, 직업 중복, 보정 전투력을 기준으로
          4인 또는 8인 레이드 파티를 구성합니다.
        </p>
      </section>

      <section class="panel input-panel">
        <div class="panel-header">
          <div>
            <h2>Owner 입력</h2>
            <p class="muted">쉼표, 공백, 줄바꿈으로 구분할 수 있습니다.</p>
          </div>
          <button id="clearOwnersButton" type="button" class="ghost-button">입력 초기화</button>
        </div>

        <textarea id="ownerInput" rows="6" placeholder="예: 찬범&#10;재진&#10;강찬&#10;준형&#10;준혁&#10;혁준&#10;혜연"></textarea>

        <div id="ownerChips" class="chips" aria-label="owner 빠른 선택"></div>

        <div class="options">
          <label>
            <input id="useReserve" type="checkbox" checked />
            임시 캐릭터 reserve=true 사용
          </label>
          <label>
            <input id="allowOwnerRepeat" type="checkbox" checked />
            8인 레이드에서 같은 owner가 다른 파티에 1명씩 들어가는 것 허용
          </label>
        </div>

        <div id="warnings" class="warnings"></div>

        <button id="matchButton" type="button" class="primary-button">다음 레이드 매칭</button>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>레이드 대기열</h2>
            <p class="muted">매칭되면 같은 key prefix 그룹이 함께 제외됩니다.</p>
          </div>
          <button id="resetQueueButton" type="button" class="ghost-button">대기열 초기화</button>
        </div>
        <ul id="queue" class="queue"></ul>
      </section>

      <section id="result" class="result">
        <article class="empty-result">
          <h2>아직 매칭 결과가 없습니다.</h2>
          <p>owner를 선택하고 “다음 레이드 매칭”을 눌러 주세요.</p>
        </article>
      </section>

      <section class="panel">
        <h2>매칭 기록</h2>
        <div id="history" class="history"></div>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>

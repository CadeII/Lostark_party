<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로스트아크 레이드 자동 매칭</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <div>
          <p class="eyebrow">Lost Ark Raid Matcher</p>
          <h1>로스트아크 레이드 파티 자동 매칭</h1>
          <p>
            owner를 선택하거나 이름을 입력하면 레벨, 역할, 시너지, 직업 중복, 보정 전투력을 기준으로
            4인 또는 8인 공격대를 자동으로 구성합니다. 8인 레이드에서 7명만 입력하면 공석 1자리를 외부 구인으로 둡니다. 8인에서 1자리가 부족하면 외부 구인 슬롯으로 남길 수 있습니다.
          </p>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>1. 참여 owner 선택</h2>
          <span id="selectedOwnerText" class="muted"></span>
        </div>
        <div id="ownerList" class="chip-list"></div>
        <label class="field">
          <span>직접 입력</span>
          <input id="ownerInput" type="text" placeholder="예: 찬범 재진 강찬 준형 준혁 혁준 혜연" />
          <small>입력값이 있으면 체크박스 선택보다 우선합니다. 공백, 쉼표, 줄바꿈 모두 가능.</small>
        </label>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>2. 매칭 옵션</h2>
        </div>
        <div class="option-grid">
          <label class="toggle">
            <input id="consumeRaidFamily" type="checkbox" checked />
            <span>같은 레이드 family는 하나만 사용</span>
          </label>
          <label class="toggle">
            <input id="enforceUniqueOwnerAcrossRaid" type="checkbox" checked />
            <span>8인 공격대 전체 owner 중복 금지</span>
          </label>
          <label class="toggle">
            <input id="allowReserveOwnerOverlap" type="checkbox" checked />
            <span>reserve는 임시 인원으로 owner 중복 예외 처리</span>
          </label>
          <label class="toggle">
            <input id="allowExternalEmptySlotForEightRaid" type="checkbox" checked />
            <span>8인 레이드에서 7명 입력 시 외부 구인 1자리 허용</span>
          </label>
        </div>
        <div id="characterSummary" class="metrics"></div>
      </section>

      <section class="panel actions">
        <button id="matchOneButton" class="primary">가장 좋은 레이드 1개 매칭</button>
        <button id="matchAllButton">남은 레이드 전체 자동 매칭</button>
        <button id="resetQueueButton">레이드 대기열 초기화</button>
        <button id="resetResultsButton">결과 지우기</button>
      </section>

      <section class="layout">
        <aside class="panel">
          <div class="panel-header">
            <h2>레이드 대기열</h2>
          </div>
          <div id="raidQueue" class="raid-list"></div>
        </aside>

        <section class="panel result-panel">
          <div class="panel-header">
            <h2>매칭 결과</h2>
          </div>
          <div id="results"></div>
          <div id="diagnostics" class="diagnostics"></div>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
